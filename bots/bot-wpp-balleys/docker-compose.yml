version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_charlie
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      # CORREÇÃO 1: Ajustado para DB_PASS conforme o relatório do Manus
      POSTGRES_PASSWORD: ${DB_PASS} 
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # CORREÇÃO 2: Injeta o script para criar a tabela "contatos" automaticamente na VPS
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: redis_charlie
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    image: ghcr.io/FmzJuan/charlie-bot:latest
    container_name: bot_charlie_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      # Mantém a sessão do WhatsApp salva na VPS
      - ./auth_info_baileys:/app/auth_info_baileys

  watchtower:
    # CORREÇÃO 3: O nome correto da imagem oficial é containrrr/watchtower
    image: containrrr/watchtower 
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 bot_charlie_app

volumes:
  postgres_data:
  redis_data: