name: CI-Qualidade-Site

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  build-check:
    runs-on: ubuntu-latest
    # AQUI ESTÁ O SEGREDO: dizemos ao robô para entrar na pasta do site antes de rodar os comandos
    defaults:
      run:
        working-directory: ./site/juan-portfolio-completo

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Precisamos apontar onde está o package-lock.json para o cache funcionar
          cache-dependency-path: ./site/juan-portfolio-completo/package-lock.json

      - name: Instalar Dependências
        run: npm install

      - name: Testar o Build
        run: npm run build