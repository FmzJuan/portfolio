name: CI-Geral-Portfolio

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  # --- VERIFICAÇÃO DO SITE ---
  job-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./site/juan-portfolio-completo/package-lock.json

      - name: Install & Build Site
        run: |
          cd site/juan-portfolio-completo
          npm install --legacy-peer-deps
          chmod -R +x node_modules/.bin
          
          # 1. Build do Front-end
          npx vite build
          
          # 2. Build do Servidor - Tentando os 2 caminhos mais comuns
          if [ -f "./server/index.ts" ]; then
            echo "Achei na raiz do projeto!"
            npx esbuild ./server/index.ts --bundle --platform=node --format=esm --outdir=dist --external:fsevents
          elif [ -f "./src/server/index.ts" ]; then
            echo "Achei dentro da pasta SRC!"
            npx esbuild ./src/server/index.ts --bundle --platform=node --format=esm --outdir=dist --external:fsevents
          else
            echo "ERRO: Não achei o arquivo de servidor. Listando pastas do projeto (ignorando node_modules):"
            find . -maxdepth 3 -not -path '*/.*' -not -path './node_modules*'
            exit 1
          fi

  # --- VERIFICAÇÃO DO CRM ---
  job-crm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./site/crm-wpp/package-lock.json

      - name: Install & Build CRM
        run: |
          cd site/crm-wpp
          npm install --legacy-peer-deps
          npm run build

  # --- VERIFICAÇÃO DO BOT (BAILEYS) ---
  job-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./bots/bot-wpp-balleys/package-lock.json

      - name: Install & Check Bot
        run: |
          cd bots/bot-wpp-balleys
          npm install --legacy-peer-deps
          # Se tiveres um comando de build ou lint no bot, adiciona aqui:
          # npm run build