name: CI-Geral-Portfolio

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  # --- VERIFICAÇÃO DO SITE ---
  job-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./site/juan-portfolio-completo/package-lock.json

      - name: Install & Build Site
        run: |
         cd site/juan-portfolio-completo
          # 1. Instala as dependências
          npm install --legacy-peer-deps
          
          # 2. CORREÇÃO: Garante permissão de execução para os binários (Vite, etc)
          chmod -R +x node_modules/.bin
          
          # 3. Roda o build usando o caminho direto ou npx
          ./node_modules/.bin/vite build
        env:
          # Variáveis para evitar os avisos do Vite no build (opcional, mas recomendado)
          VITE_ANALYTICS_ENDPOINT: https://analytics.umami.is
          VITE_ANALYTICS_WEBSITE_ID: 00000000-0000-0000-0000-000000000000

  # --- VERIFICAÇÃO DO CRM ---
  job-crm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./site/crm-wpp/package-lock.json

      - name: Install & Build CRM
        run: |
          cd site/crm-wpp
          npm install --legacy-peer-deps
          npm run build

  Quase isso! Você teve um pequeno erro de identação (espaçamento) e de lógica no comando de teste. As variáveis de ambiente (env) precisam estar no passo do Jest, pois é nele que o código tenta conectar ao banco/redis para testar. Além disso, o comando node --check deve estar em seu próprio passo ou logo após o npm test.

Aqui está o trecho do job-bot corrigido para você copiar e substituir. Note que usei serviços auxiliares (services) para que o GitHub realmente suba um banco e um redis temporários para o seu teste passar de verdade:

YAML
  # --- VERIFICAÇÃO DO BOT (BAILEYS) ---
  job-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    # Adicionamos serviços reais para o teste não dar erro de conexão
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: leadsflow
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./bots/bot-wpp-balleys/package-lock.json

      - name: Install Dependencies
        run: |
          cd bots/bot-wpp-balleys
          npm install --legacy-peer-deps

      - name: Run Automated Tests (Jest)
        env:
          # Estas variáveis permitem que o Jest conecte nos services acima
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leadsflow
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: |
          cd bots/bot-wpp-balleys
          npm test

      - name: Check Code Syntax
        run: |
          cd bots/bot-wpp-balleys
          node --check index.js
          node --check Engine/whatsapp.js

      # ----- GHCR (Só acontece se os testes acima passarem) ------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./bots/bot-wpp-balleys
          push: true
          tags: ghcr.io/fmzjuan/charlie-bot:latest