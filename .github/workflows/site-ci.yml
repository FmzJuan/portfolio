name: CI-Geral-Portfolio

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  # --- VERIFICAÇÃO DO SITE ---
  job-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./site/juan-portfolio-completo/package-lock.json

      - name: Install & Build Site
        run: |
         cd site/juan-portfolio-completo
          # 1. Instala as dependências
          npm install --legacy-peer-deps
          
          # 2. CORREÇÃO: Garante permissão de execução para os binários (Vite, etc)
          chmod -R +x node_modules/.bin
          
          # 3. Roda o build usando o caminho direto ou npx
          ./node_modules/.bin/vite build
        env:
          # Variáveis para evitar os avisos do Vite no build (opcional, mas recomendado)
          VITE_ANALYTICS_ENDPOINT: https://analytics.umami.is
          VITE_ANALYTICS_WEBSITE_ID: 00000000-0000-0000-0000-000000000000

  # --- VERIFICAÇÃO DO CRM ---
  job-crm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./site/crm-wpp/package-lock.json

      - name: Install & Build CRM
        run: |
          cd site/crm-wpp
          npm install --legacy-peer-deps
          npm run build

  # --- VERIFICAÇÃO DO BOT (BAILEYS) ---

  job-bot:
    runs-on: ubuntu-latest
    #  MUITO IMPORTANTE: Dá permissão para a Action salvar no GHCR
    permissions:
      contents: read
      packages: write 
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./bots/bot-wpp-balleys/package-lock.json

      - name: Install Dependencies
        run: |
          cd bots/bot-wpp-balleys
          npm install --legacy-peer-deps

      - name: Check Code Syntax (Verifica erros de digitação e chaves abertas)
        run: |
          cd bots/bot-wpp-balleys
          node --check index.js
          node --check Engine/whatsapp.js
          node --check Engine/sheets.js
          
      # ----- GHCR ------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Este passo FAZ O BUILD e FAZ O PUSH para a nuvem de uma vez só
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./bots/bot-wpp-balleys
          push: true
          # CORREÇÃO: Removida a variável, inserido 'fmzjuan' todo em minúsculo
          tags: ghcr.io/fmzjuan/charlie-bot:latest